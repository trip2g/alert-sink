global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alert-sink
    static_configs:
      - targets: ["alert-sink:9095"]

  # Stop/start this container to walk an alert through firing -> resolved.
  - job_name: demo-target
    static_configs:
      - targets: ["demo-target:9100"]
